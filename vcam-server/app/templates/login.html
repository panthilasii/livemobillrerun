<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ brand }} — เข้าสู่ระบบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', system-ui, sans-serif; }
    .bg-brand { background:#C8102E; }
    .text-brand { color:#C8102E; }
    .border-brand { border-color:#C8102E; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">

  <div class="w-full max-w-sm bg-white rounded-2xl shadow-xl p-8 border border-slate-200">

    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-lg bg-brand text-white flex items-center justify-center font-bold text-lg">
        NP
      </div>
      <div>
        <div class="font-bold text-slate-900">{{ brand }}</div>
        <div class="text-xs text-slate-500">License + Customer Console</div>
      </div>
    </div>

    {% if error %}
    <div class="mb-4 px-3 py-2 rounded-md bg-red-50 border border-red-200 text-sm text-red-700">
      อีเมลหรือรหัสผ่านไม่ถูกต้อง
    </div>
    {% endif %}

    <form method="post" action="/admin/login" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1">อีเมล</label>
        <input type="email" name="email" required autofocus
               autocomplete="username"
               class="w-full px-3 py-2 rounded-md border border-slate-300 focus:border-brand focus:ring-1 focus:ring-red-200 outline-none">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1">รหัสผ่าน</label>
        <input type="password" name="password" required
               autocomplete="current-password"
               class="w-full px-3 py-2 rounded-md border border-slate-300 focus:border-brand focus:ring-1 focus:ring-red-200 outline-none">
      </div>
      <button type="submit"
              class="w-full px-4 py-2 rounded-md bg-brand text-white font-semibold hover:opacity-90 transition">
        เข้าสู่ระบบ
      </button>
    </form>

    <p class="mt-6 text-xs text-center text-slate-400">
      ผู้ดูแลระบบเท่านั้น — ลูกค้าใช้แอป NP Create บนคอมพิวเตอร์
    </p>

  </div>

</body>
</html>
